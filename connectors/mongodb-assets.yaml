connectorId: mongodb-assets
sourceType: mongodb
description: MongoDB assets database — polling
enabled: true

connection:
  uri: "mongodb://${MONGO_HOST}:${MONGO_PORT}"
  database: "${MONGO_DB}"

changeDetection:
  mode: polling
  pollIntervalSeconds: 30
  watermarkColumn: updatedAt
  lookbackDuration: PT1H

watch:
  autoDiscover: false
  entities:
    - name: assets
      primaryKey: [_id]
    - name: locations
      primaryKey: [_id]

fieldMapping: []

nats:
  subjectOverride: mongodb-changes
  additionalHeaders:
    domain: asset-management

resilience:
  maxConsecutiveFailures: 5
  retryDelaySeconds: 10
  backoffMultiplier: 1.5
  maxRetryDelaySeconds: 120
