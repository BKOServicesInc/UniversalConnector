connectorId: pg-orders
sourceType: postgres
description: Orders database — Postgres WAL CDC
enabled: true

connection:
  host: "${POSTGRES_HOST}"
  port: "${POSTGRES_PORT}"
  database: "${POSTGRES_DB}"
  username: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"

changeDetection:
  mode: cdc
  replicationSlot: uc_slot
  publication: uc_pub

watch:
  autoDiscover: false
  entities:
    - name: public.orders
      primaryKey: [id]
    - name: public.order_items
      primaryKey: [id]

fieldMapping:
  - source: created_at
    type: timestamp
  - source: updated_at
    type: timestamp

nats:
  subjectOverride: orders-changes
  additionalHeaders:
    domain: order-management

resilience:
  maxConsecutiveFailures: 5
  retryDelaySeconds: 10
  backoffMultiplier: 1.5
  maxRetryDelaySeconds: 120
