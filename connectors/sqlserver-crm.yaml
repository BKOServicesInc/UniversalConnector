driverId: sqlserver-crm
context: ctx:crm
sourceType: sqlserver
description: CRM database — SQL Server Change Tracking
enabled: false

connection:
  host: "${SQLSERVER_HOST}"
  port: "${SQLSERVER_PORT}"
  database: "${SQLSERVER_DB}"
  username: "${SQLSERVER_USER}"
  password: "${SQLSERVER_PASSWORD}"

changeDetection:
  mode: cdc
  pollIntervalSeconds: 15
  autoEnableChangeTracking: true

watch:
  autoDiscover: false
  entities:
    - name: dbo.Customers
      primaryKey: [CustomerId]
    - name: dbo.Contacts
      primaryKey: [ContactId]

fieldMapping:
  - source: ModifiedDate
    type: timestamp
    target: updatedAt

nats:
  subjectOverride: crm-changes
  additionalHeaders:
    domain: customer-management

resilience:
  maxConsecutiveFailures: 5
  retryDelaySeconds: 15
