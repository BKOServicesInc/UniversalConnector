driverId: neo4j-graph
context: ctx:knowledge-graph
sourceType: neo4j
description: Knowledge graph — Neo4j Bolt polling
enabled: false

connection:
  uri: "bolt://${NEO4J_HOST}:${NEO4J_PORT}"
  username: "${NEO4J_USER}"
  password: "${NEO4J_PASSWORD}"

changeDetection:
  mode: polling
  pollIntervalSeconds: 5
  watermarkColumn: updatedAt
  lookbackDuration: PT2H

watch:
  autoDiscover: false
  entities:
    - name: Asset
      primaryKey: [assetId]
    - name: Location
      primaryKey: [locationId]
    - name: REL:LOCATED_AT
      primaryKey: [id]

nats:
  subjectOverride: graph-changes
  additionalHeaders:
    domain: asset-management

resilience:
  maxConsecutiveFailures: 3
  retryDelaySeconds: 20
