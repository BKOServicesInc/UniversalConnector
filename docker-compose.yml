services:
  universal-connector:
    build: .
    environment:
      # NATS
      Nats__Servers__0: nats://nats:4222
      GenericConnector__DescriptorDirectory: /app/connectors
      GenericConnector__FailOnDescriptorError: "false"
      # Postgres (set these for postgres-orders.yaml)
      POSTGRES_HOST: postgres
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      # SQL Server (set these for sqlserver-crm.yaml)
      SQLSERVER_HOST: sqlserver
      SQLSERVER_DB: crmdb
      SQLSERVER_USER: connector
      SQLSERVER_PASSWORD: YourStrongPassword123!
      # Neo4j (set these for neo4j-graph.yaml)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - ./connectors:/app/connectors:ro
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - connector-net
    restart: unless-stopped

  nats:
    image: nats:alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - connector-net
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: connector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector -d ordersdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - connector-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - connector-net
    restart: unless-stopped

networks:
  connector-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
