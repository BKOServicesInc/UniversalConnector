services:
  nats:
    image: nats:alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - connector-net
    restart: unless-stopped

networks:
  connector-net:
    driver: bridge
