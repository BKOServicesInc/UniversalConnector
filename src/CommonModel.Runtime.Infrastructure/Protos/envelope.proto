// Schema evolution rules:
//   COMPATIBLE (safe):   adding new optional fields with new field numbers,
//                        adding enum values.
//   BREAKING (requires coordination): removing or renaming fields,
//                        changing field types, reusing field numbers.
// Bump the package minor version (v1 → v2) only on breaking changes;
// consumers that ignore unknown fields will tolerate compatible additions.

syntax = "proto3";

package commonmodel.runtime.v1;

option csharp_namespace = "CommonModel.Runtime.Infrastructure.Wire";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

message Envelope {
  string event_id = 1;
  google.protobuf.Timestamp detected_at = 2;
  google.protobuf.Timestamp source_timestamp = 3;
  string source_type = 4;
  string driver_id = 5;
  string context = 6;
  string entity_path = 7;
  string change_type = 8;
  // primary_key / fields / previous_fields carry polymorphic values
  // (string, number, bool, nested object, list). Encoded as
  // google.protobuf.Value so the protobuf-to-JSON projection emits
  // real nested JSON instead of stringified type names.
  map<string, google.protobuf.Value> primary_key = 9;
  map<string, google.protobuf.Value> fields = 10;
  map<string, google.protobuf.Value> previous_fields = 11;
  map<string, string> metadata = 12;
  int64 sequence_number = 13;
}
