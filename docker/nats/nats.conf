# NATS Server configuration for UniversalConnector
# Docs: https://docs.nats.io/running-a-nats-service/configuration

port: 4222

# Monitoring HTTP endpoint — used by health checks and nats-surveyor
http_port: 8222

# Maximum per-message payload (default 1 MB)
max_payload: 4MB

# Connection limits
max_connections: 1000
max_pending: 128MB

# ── JetStream ─────────────────────────────────────────────────────────────────
jetstream {
  # Persist JetStream state to a mounted Docker volume
  store_dir: /data/jetstream

  # Memory store ceiling (across all streams)
  max_mem: 512MB

  # File store ceiling (across all streams)
  max_file: 10GB
}

# ── Logging ───────────────────────────────────────────────────────────────────
# debug: false   # set true for verbose output during development
# trace: false

